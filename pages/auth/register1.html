<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Traders Helmet Academy</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    
	<script src="/assets/js/sdk-config.js"></script>

    <!-- CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --primary-blue-light: #3b82f6;
            --secondary-purple: #7c3aed;
            --accent-gold: #f59e0b;
            --background-dark: #0f172a;
            --background-card: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.1);
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.1);
            --error: #ef4444;
            --error-light: rgba(239, 68, 68, 0.1);
            --gradient-primary: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-purple) 100%);
            --gradient-card: linear-gradient(135deg, rgba(30, 58, 138, 0.1) 0%, rgba(124, 58, 237, 0.1) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .registration-container {
            background: var(--gradient-card);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            margin: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .password-input-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
        }

        .password-toggle:hover {
            color: var(--text-primary);
        }

        .password-strength {
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .password-strength.weak {
            background: var(--error-light);
            color: var(--error);
            display: block;
        }

        .password-strength.medium {
            background: var(--warning-light);
            color: var(--warning);
            display: block;
        }

        .password-strength.strong {
            background: var(--success-light);
            color: var(--success);
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 0.25rem;
            accent-color: var(--primary-blue-light);
        }

        .checkbox-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .checkbox-group a {
            color: var(--primary-blue-light);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn.loading .loading-spinner {
            display: inline-block;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .google-signup {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .google-btn {
            width: 100%;
            padding: 0.875rem;
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            background: #f8f9fa;
            transform: translateY(-1px);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-link p {
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--primary-blue-light);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: var(--error-light);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: var(--error);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: var(--success-light);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            color: var(--success);
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .field-error {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }

        .field-error.show {
            display: block;
        }

        .form-input.error {
            border-color: var(--error);
        }

        .debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            max-width: 300px;
            z-index: 1000;
        }

        @media (max-width: 640px) {
            .registration-container {
                margin: 1rem;
                padding: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="header">
            <h1>Create Your Account</h1>
            <p>Join Traders Helmet Academy and start your trading journey</p>
        </div>

        <!-- Debug Information -->
        <div id="debugInfo"></div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText">Registration successful! Please check your email to verify your account.</span>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">Please fix the errors below</span>
        </div>

        <form id="registrationForm" class="registration-form">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" class="form-input" 
                           placeholder="John" required>
                    <div id="firstNameError" class="field-error"></div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" class="form-input" 
                           placeholder="Doe" required>
                    <div id="lastNameError" class="field-error"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" 
                       placeholder="john@example.com" required>
                <div id="emailError" class="field-error"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number (Optional)</label>
                <input type="tel" id="phone" name="phone" class="form-input" 
                       placeholder="+1 (555) 123-4567">
                <div id="phoneError" class="field-error"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-input-container">
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="Create a strong password" required>
                    <button type="button" class="password-toggle" id="passwordToggle">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div id="passwordStrength" class="password-strength"></div>
                <div id="passwordError" class="field-error"></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" 
                       placeholder="Confirm your password" required>
                <div id="confirmPasswordError" class="field-error"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                <label for="agreeTerms">
                    I agree to the <a href="/pages/legal/terms.html" target="_blank">Terms of Service</a> 
                    and <a href="/pages/legal/privacy.html" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <div class="loading-spinner"></div>
                <span>Create Account</span>
            </button>
        </form>

        <div class="google-signup">
            <p style="color: var(--text-muted); margin-bottom: 1rem;">Or sign up with</p>
            <button type="button" id="googleSignupBtn" class="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <div class="login-link">
            <p>Already have an account? <a href="/pages/auth/login.html">Sign In</a></p>
        </div>
    </div>

    <!-- SDK Configuration -->
    <script src="/assets/js/sdk-config.js"></script>

    <script>
        class RegistrationForm {
            constructor() {
                this.form = document.getElementById('registrationForm');
                this.submitBtn = document.getElementById('submitBtn');
                this.googleSignupBtn = document.getElementById('googleSignupBtn');
                this.passwordToggle = document.getElementById('passwordToggle');
                this.passwordInput = document.getElementById('password');
                this.confirmPasswordInput = document.getElementById('confirmPassword');
                
                this.init();
            }

            init() {
                console.log('🔄 Initializing Registration Form...');
                
                // Wait for SDKs
                if (window.SDK_DEBUG && (window.SDK_DEBUG.firebase || window.SDK_DEBUG.supabase)) {
                    this.handleSDKReady();
                } else {
                    window.addEventListener('sdksReady', () => this.handleSDKReady());
                }

                this.attachEventListeners();
            }

            handleSDKReady() {
                console.log('✅ SDKs ready for registration');
                
                // Enable form submission
                this.submitBtn.disabled = false;
                
                // Enable Google signup if Firebase is available
                if (window.SDK_DEBUG.firebase) {
                    this.googleSignupBtn.disabled = false;
                } else {
                    this.googleSignupBtn.style.display = 'none';
                    document.querySelector('.google-signup p').textContent = 'Google signup temporarily unavailable';
                }
            }

            attachEventListeners() {
                // Form submission
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));
                
                // Google signup
                this.googleSignupBtn.addEventListener('click', () => this.handleGoogleSignup());
                
                // Password toggle
                this.passwordToggle.addEventListener('click', () => this.togglePassword());
                
                // Password strength checker
                this.passwordInput.addEventListener('input', () => this.checkPasswordStrength());
                
                // Password confirmation
                this.confirmPasswordInput.addEventListener('input', () => this.validatePasswordMatch());
                
                // Real-time validation
                this.form.querySelectorAll('input').forEach(input => {
                    input.addEventListener('blur', () => this.validateField(input));
                });
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                console.log('🔄 Form submission started...');
                
                // Clear previous errors
                this.clearErrors();
                
                // Validate form
                if (!this.validateForm()) {
                    console.log('❌ Form validation failed');
                    return;
                }
                
                // Show loading state
                this.setLoadingState(true);
                
                try {
                    // Get form data
                    const formData = new FormData(this.form);
                    const userData = Object.fromEntries(formData.entries());
                    
                    console.log('📝 Form data:', userData.email);
                    
                    // Try Firebase registration first
                    let result = await this.registerWithFirebase(userData);
                    
                    if (result.success) {
                        console.log('✅ Firebase registration successful');
                        await this.createSupabaseProfile(result.user, userData);
                        this.showSuccess('Registration successful! Please check your email to verify your account.');
                        
                        // Redirect after delay
                        setTimeout(() => {
                            const redirect = new URLSearchParams(window.location.search).get('redirect');
                            if (redirect === 'subscription') {
                                window.location.href = '/pages/auth/login.html?redirect=subscription';
                            } else {
                                window.location.href = '/pages/auth/verify-email.html?email=' + encodeURIComponent(userData.email);
                            }
                        }, 3000);
                    } else {
                        throw new Error(result.message);
                    }
                    
                } catch (error) {
                    console.error('❌ Registration error:', error);
                    this.showError(error.message || 'Registration failed. Please try again.');
                } finally {
                    this.setLoadingState(false);
                }
            }

            async registerWithFirebase(userData) {
                try {
                    console.log('🔄 Attempting Firebase registration...');
                    
                    if (!window.firebaseAuth || !window.firebaseAuth.createUser) {
                        throw new Error('Firebase authentication not available');
                    }
                    
                    const displayName = `${userData.firstName} ${userData.lastName}`.trim();
                    const userCredential = await window.firebaseAuth.createUser(
                        userData.email,
                        userData.password,
                        displayName
                    );
                    
                    return {
                        success: true,
                        user: userCredential.user,
                        message: 'Firebase registration successful'
                    };
                    
                } catch (error) {
                    console.error('Firebase registration error:', error);
                    
                    // Try fallback registration
                    return await this.registerWithSupabase(userData);
                }
            }

            async registerWithSupabase(userData) {
                try {
                    console.log('🔄 Attempting Supabase registration fallback...');
                    
                    if (!window.supabase) {
                        throw new Error('Database not available');
                    }
                    
                    const { data, error } = await window.supabase.auth.signUp({
                        email: userData.email,
                        password: userData.password,
                        options: {
                            data: {
                                first_name: userData.firstName,
                                last_name: userData.lastName,
                                phone: userData.phone
                            }
                        }
                    });
                    
                    if (error) throw error;
                    
                    return {
                        success: true,
                        user: data.user,
                        message: 'Registration successful'
                    };
                    
                } catch (error) {
                    console.error('Supabase registration error:', error);
                    
                    return {
                        success: false,
                        message: this.getErrorMessage(error)
                    };
                }
            }

            async createSupabaseProfile(user, userData) {
                try {
                    if (!window.supabase) return;
                    
                    const { error } = await window.supabase
                        .from('user_profiles')
                        .insert([{
                            id: user.uid,
                            email: userData.email,
                            first_name: userData.firstName,
                            last_name: userData.lastName,
                            phone: userData.phone,
                            subscription_tier: 'none',
                            subscription_status: 'inactive',
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (error) {
                        console.warn('Profile creation warning:', error.message);
                    } else {
                        console.log('✅ User profile created in database');
                    }
                    
                } catch (error) {
                    console.warn('Profile creation error:', error);
                }
            }

            async handleGoogleSignup() {
                try {
                    console.log('🔄 Google signup started...');
                    
                    if (!window.firebaseAuth || !window.firebaseAuth.signInWithGoogle) {
                        throw new Error('Google signup not available');
                    }
                    
                    this.clearErrors();
                    this.googleSignupBtn.disabled = true;
                    
                    const result = await window.firebaseAuth.signInWithGoogle();
                    const user = result.user;
                    
                    console.log('✅ Google signup successful');
                    
                    // Create profile in Supabase
                    await this.createSupabaseProfile(user, {
                        email: user.email,
                        firstName: user.displayName?.split(' ')[0] || '',
                        lastName: user.displayName?.split(' ').slice(1).join(' ') || '',
                        phone: ''
                    });
                    
                    this.showSuccess(`Welcome ${user.displayName}! Your account has been created.`);
                    
                    // Redirect
                    setTimeout(() => {
                        const redirect = new URLSearchParams(window.location.search).get('redirect');
                        if (redirect === 'subscription') {
                            window.location.href = '/subscription.html';
                        } else {
                            window.location.href = '/pages/dashboard/';
                        }
                    }, 2000);
                    
                } catch (error) {
                    console.error('❌ Google signup error:', error);
                    this.showError(this.getErrorMessage(error));
                } finally {
                    this.googleSignupBtn.disabled = false;
                }
            }

            validateForm() {
                let isValid = true;
                
                // Validate each field
                const fields = ['firstName', 'lastName', 'email', 'password', 'confirmPassword'];
                fields.forEach(fieldName => {
                    const field = document.getElementById(fieldName);
                    if (!this.validateField(field)) {
                        isValid = false;
                    }
                });
                
                // Check terms agreement
                const agreeTerms = document.getElementById('agreeTerms');
                if (!agreeTerms.checked) {
                    this.showError('Please agree to the Terms of Service and Privacy Policy');
                    isValid = false;
                }
                
                return isValid;
            }

            validateField(field) {
                const value = field.value.trim();
                const fieldName = field.name;
                let isValid = true;
                let errorMessage = '';
                
                // Clear previous error
                this.clearFieldError(fieldName);
                
                switch (fieldName) {
                    case 'firstName':
                    case 'lastName':
                        if (!value) {
                            errorMessage = 'This field is required';
                            isValid = false;
                        } else if (value.length < 2) {
                            errorMessage = 'Must be at least 2 characters';
                            isValid = false;
                        }
                        break;
                        
                    case 'email':
                        if (!value) {
                            errorMessage = 'Email is required';
                            isValid = false;
                        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
                            errorMessage = 'Please enter a valid email address';
                            isValid = false;
                        }
                        break;
                        
                    case 'password':
                        if (!value) {
                            errorMessage = 'Password is required';
                            isValid = false;
                        } else if (value.length < 8) {
                            errorMessage = 'Password must be at least 8 characters';
                            isValid = false;
                        }
                        break;
                        
                    case 'confirmPassword':
                        const password = document.getElementById('password').value;
                        if (!value) {
                            errorMessage = 'Please confirm your password';
                            isValid = false;
                        } else if (value !== password) {
                            errorMessage = 'Passwords do not match';
                            isValid = false;
                        }
                        break;
                }
                
                if (!isValid) {
                    this.showFieldError(fieldName, errorMessage);
                }
                
                return isValid;
            }

            checkPasswordStrength() {
                const password = this.passwordInput.value;
                const strengthElement = document.getElementById('passwordStrength');
                
                if (!password) {
                    strengthElement.style.display = 'none';
                    return;
                }
                
                let strength = 0;
                let feedback = [];
                
                // Length check
                if (password.length >= 8) strength++;
                else feedback.push('at least 8 characters');
                
                // Uppercase check
                if (/[A-Z]/.test(password)) strength++;
                else feedback.push('uppercase letter');
                
                // Lowercase check
                if (/[a-z]/.test(password)) strength++;
                else feedback.push('lowercase letter');
                
                // Number check
                if (/\d/.test(password)) strength++;
                else feedback.push('number');
                
                // Special character check
                if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
                else feedback.push('special character');
                
                // Update display
                strengthElement.style.display = 'block';
                
                if (strength < 3) {
                    strengthElement.className = 'password-strength weak';
                    strengthElement.textContent = `Weak password. Add: ${feedback.slice(0, 2).join(', ')}`;
                } else if (strength < 5) {
                    strengthElement.className = 'password-strength medium';
                    strengthElement.textContent = `Good password. Consider adding: ${feedback[0] || 'more complexity'}`;
                } else {
                    strengthElement.className = 'password-strength strong';
                    strengthElement.textContent = 'Strong password!';
                }
            }

            validatePasswordMatch() {
                const password = this.passwordInput.value;
                const confirmPassword = this.confirmPasswordInput.value;
                
                if (confirmPassword && password !== confirmPassword) {
                    this.showFieldError('confirmPassword', 'Passwords do not match');
                } else {
                    this.clearFieldError('confirmPassword');
                }
            }

            togglePassword() {
                const type = this.passwordInput.type === 'password' ? 'text' : 'password';
                this.passwordInput.type = type;
                
                const icon = this.passwordToggle.querySelector('i');
                icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            }

            showError(message) {
                const errorElement = document.getElementById('errorMessage');
                const errorText = document.getElementById('errorText');
                errorText.textContent = message;
                errorElement.classList.add('show');
                
                // Hide success message
                document.getElementById('successMessage').classList.remove('show');
            }

            showSuccess(message) {
                const successElement = document.getElementById('successMessage');
                const successText = document.getElementById('successText');
                successText.textContent = message;
                successElement.classList.add('show');
                
                // Hide error message
                document.getElementById('errorMessage').classList.remove('show');
            }

            clearErrors() {
                document.getElementById('errorMessage').classList.remove('show');
                document.getElementById('successMessage').classList.remove('show');
                
                // Clear field errors
                const errorElements = document.querySelectorAll('.field-error');
                errorElements.forEach(el => {
                    el.classList.remove('show');
                    el.textContent = '';
                });
                
                // Clear input error states
                const inputs = document.querySelectorAll('.form-input');
                inputs.forEach(input => input.classList.remove('error'));
            }

            showFieldError(fieldName, message) {
                const errorElement = document.getElementById(`${fieldName}Error`);
                const inputElement = document.getElementById(fieldName);
                
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.classList.add('show');
                }
                
                if (inputElement) {
                    inputElement.classList.add('error');
                }
            }

            clearFieldError(fieldName) {
                const errorElement = document.getElementById(`${fieldName}Error`);
                const inputElement = document.getElementById(fieldName);
                
                if (errorElement) {
                    errorElement.classList.remove('show');
                    errorElement.textContent = '';
                }
                
                if (inputElement) {
                    inputElement.classList.remove('error');
                }
            }

            setLoadingState(loading) {
                this.submitBtn.disabled = loading;
                this.submitBtn.classList.toggle('loading', loading);
                
                const buttonText = this.submitBtn.querySelector('span');
                buttonText.textContent = loading ? 'Creating Account...' : 'Create Account';
            }

            getErrorMessage(error) {
                const errorMessages = {
                    'auth/email-already-in-use': 'This email address is already registered. Try signing in instead.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/weak-password': 'Password is too weak. Please choose a stronger password.',
                    'auth/operation-not-allowed': 'Email registration is currently disabled. Please contact support.',
                    'auth/network-request-failed': 'Network error. Please check your internet connection.',
                    'auth/popup-closed-by-user': 'Signup was cancelled. Please try again.',
                    'auth/popup-blocked': 'Popup was blocked. Please allow popups and try again.',
                    'auth/account-exists-with-different-credential': 'An account already exists with this email using a different sign-in method.'
                };
                
                return errorMessages[error.code] || error.message || 'An unexpected error occurred. Please try again.';
            }
        }

        // Initialize registration form
        document.addEventListener('DOMContentLoaded', () => {
            new RegistrationForm();
        });
    </script>
</body>
</html>
