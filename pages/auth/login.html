<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traders Helmet Academy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- ✅ THA Auth v3.0 — replaces broken CDN Firebase + config.js -->
    <script type="module" src="/assets/js/tha-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; position: relative; }
        .header { text-align: center; margin-bottom: 40px; animation: fadeInDown 1s ease-out; }
        .logo { color: #f7f3e9; font-size: 3rem; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .tagline { color: #f7f3e9; font-size: 1.2rem; opacity: 0.9; }
        .login-container { display: flex; justify-content: center; animation: fadeIn 1s ease-out 0.3s both; }
        .login-form {
            background: rgba(247,243,233,0.95); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 40px; width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.2);
            position: relative; overflow: hidden;
        }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-icon {
            width: 80px; height: 80px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #1e3c72, #2a5298); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;
        }
        .form-title { color: #1e3c72; font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        .form-subtitle { color: #666; font-size: 1rem; margin-bottom: 20px; }
        .subscription-notice {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border: 1px solid #2196f3; border-radius: 12px; padding: 15px; margin-bottom: 25px; text-align: center;
            display: none;
        }
        .subscription-notice h4 { color: #1976d2; font-size: 1rem; margin-bottom: 8px; font-weight: 600; }
        .subscription-notice p { color: #1565c0; font-size: 0.9rem; margin-bottom: 10px; }
        .subscription-link {
            background: linear-gradient(135deg, #2196f3, #1976d2); color: white;
            text-decoration: none; padding: 8px 16px; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; transition: all 0.3s ease; display: inline-block;
        }
        .subscription-link:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(33,150,243,0.4); color: white; }
        .form-group { margin-bottom: 25px; position: relative; }
        .form-input {
            width: 100%; padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 1rem; transition: all 0.3s ease; background: white; color: #333;
        }
        .form-input:focus { outline: none; border-color: #2a5298; box-shadow: 0 0 0 3px rgba(42,82,152,0.1); transform: translateY(-2px); }
        .form-input::placeholder { color: #999; }
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #999; transition: color 0.3s ease; }
        .form-input:focus + .input-icon { color: #2a5298; }
        .forgot-password { text-align: right; margin-bottom: 25px; }
        .forgot-password a { color: #2a5298; text-decoration: none; font-size: 0.9rem; transition: color 0.3s ease; cursor: pointer; }
        .forgot-password a:hover { color: #1e3c72; }
        .login-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; border: none; border-radius: 10px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .login-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,60,114,0.3); }
        .login-btn:hover::before { left: 100%; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .signup-section { text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
        .signup-section p { color: #666; margin-bottom: 15px; }
        .signup-section a { color: #2a5298; text-decoration: none; font-weight: bold; transition: color 0.3s ease; }
        .signup-section a:hover { color: #1e3c72; }
        .floating-elements { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .floating-element { position: absolute; background: rgba(247,243,233,0.1); border-radius: 50%; animation: float 6s ease-in-out infinite; }
        .floating-element:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { width: 120px; height: 120px; top: 20%; right: 10%; animation-delay: 2s; }
        .floating-element:nth-child(3) { width: 60px; height: 60px; bottom: 10%; left: 20%; animation-delay: 4s; }
        .floating-element:nth-child(4) { width: 100px; height: 100px; bottom: 20%; right: 20%; animation-delay: 1s; }
        .error-message, .success-message, .warning-message {
            padding: 12px 15px; border-radius: 8px; margin-bottom: 20px;
            font-size: 0.9rem; display: none; animation: slideIn 0.3s ease;
        }
        .error-message   { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
        .success-message { background: rgba(16,185,129,0.1); border: 1px solid #10b981; color: #10b981; }
        .warning-message { background: rgba(245,158,11,0.1); border: 1px solid #f59e0b; color: #f59e0b; }
        .error-message.show, .success-message.show, .warning-message.show { display: block; }
        .resend-verification { margin-top: 10px; }
        .btn-link { background: none; border: none; color: #2a5298; cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
        .btn-link:hover { color: #1e3c72; }
        .loading-spinner {
            display: none; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px;
        }
        .login-btn.loading .loading-spinner { display: inline-block; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(180deg); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .logo { font-size: 2rem; }
            .login-form { padding: 30px 20px; margin: 0 10px; }
            .form-icon { width: 60px; height: 60px; font-size: 1.5rem; }
            .form-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo"><i class="fas fa-chart-line"></i> Traders Helmet Academy</div>
            <div class="tagline">Your Gateway to Trading Excellence</div>
        </div>

        <div class="login-container">
            <form class="login-form" id="login-form">
                <div class="form-header">
                    <div class="form-icon"><i class="fas fa-user"></i></div>
                    <h2 class="form-title">Welcome Back</h2>
                    <p class="form-subtitle">Sign in to access your trading dashboard</p>
                </div>

                <!-- Shown only if user has no subscription -->
                <div class="subscription-notice" id="subscriptionNotice">
                    <h4><i class="fas fa-crown"></i> Ready to Start Trading?</h4>
                    <p>Choose your subscription tier and unlock premium trading education</p>
                    <a href="/pages/payment/subscription.html" class="subscription-link">
                        <i class="fas fa-arrow-right"></i> Choose Subscription
                    </a>
                </div>

                <div class="error-message"   id="error-message"></div>
                <div class="success-message" id="success-message"></div>
                <div class="warning-message" id="warning-message">
                    <div id="warning-text"></div>
                    <div class="resend-verification" id="resend-section" style="display:none;">
                        <button type="button" class="btn-link" id="resendBtn">Resend Verification Email</button>
                    </div>
                </div>

                <div class="form-group">
                    <input type="email" class="form-input" name="email" id="email" placeholder="Email Address" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" name="password" id="password" placeholder="Password" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <div class="forgot-password">
                    <a id="forgotPasswordLink">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <div class="loading-spinner"></div>
                    <span>Sign In to Dashboard</span>
                </button>

                <div class="signup-section">
                    <p>Don't have an account?</p>
                    <a href="/pages/auth/register.html">Create Account</a>
                    <span style="margin:0 10px;color:#ccc;">•</span>
                    <a href="/pages/payment/subscription.html">View Plans</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // ── Helpers ────────────────────────────────────────────────────────
            const $  = (id) => document.getElementById(id);
            const show = (el, msg) => { if (!el) return; el.textContent = msg; el.classList.add('show'); };
            const hide = (el) => el && el.classList.remove('show');

            function clearMessages() {
                hide($('error-message'));
                hide($('success-message'));
                hide($('warning-message'));
            }

            function setLoading(on) {
                const btn  = $('loginBtn');
                const span = btn.querySelector('span');
                btn.disabled = on;
                btn.classList.toggle('loading', on);
                span.textContent = on ? 'Signing in...' : 'Sign In to Dashboard';
            }

            // ── Check URL params ───────────────────────────────────────────────
            (function checkUrlParams() {
                const p = new URLSearchParams(window.location.search);
                if (p.get('verified') === '1')
                    show($('success-message'), 'Email verified successfully! You can now sign in.');
                if (p.get('subscribed') === '1')
                    show($('success-message'), 'Payment successful! Please sign in to access your dashboard.');
                if (p.get('error') === 'session_expired')
                    show($('warning-message'), 'Your session expired. Please sign in again.');
            })();

            // ── Main login handler ─────────────────────────────────────────────
            async function handleLogin(e) {
                e.preventDefault();
                clearMessages();

                const email    = $('email').value.trim().toLowerCase();
                const password = $('password').value;

                if (!email || !password) {
                    show($('error-message'), 'Please enter both email and password.');
                    return;
                }

                if (!window.firebaseAuth) {
                    show($('error-message'), 'Auth service not ready. Please refresh the page.');
                    return;
                }

                setLoading(true);

                try {
                    const cred = await window.firebaseAuth.login(email, password);
                    const user = cred.user;

                    // Email verification check
                    if (!user.emailVerified) {
                        window._pendingUser = user;
                        const warnEl = $('warning-message');
                        $('warning-text').textContent =
                            `Please verify your email (${user.email}) before signing in.`;
                        $('resend-section').style.display = 'block';
                        warnEl.classList.add('show');
                        setLoading(false);
                        return;
                    }

                    // ✅ Fetch subscription tier from Supabase (NOT localStorage)
                    const profile = await window.firebaseAuth.getUserProfile(user.uid);
                    const tier    = profile?.subscription_tier   || 'none';
                    const status  = profile?.subscription_status || 'inactive';
                    const role    = (user.email === 'admin@tradershelmetacademy.com') ? 'admin' : 'user';

                    show($('success-message'), `Welcome back, ${profile?.first_name || user.email.split('@')[0]}!`);

                    // All users land on the general dashboard first.
                    // The dashboard itself then shows their tier status and upgrade options.
                    setTimeout(() => {
                        window.location.href = '/pages/dashboard/index.html';
                    }, 1200);

                } catch (err) {
                    console.error('Login error:', err);
                    const msg = window.firebaseAuth
                        ? window.firebaseAuth.errorMessage(err)
                        : (err.message || 'Login failed. Please try again.');
                    show($('error-message'), msg);
                } finally {
                    setLoading(false);
                }
            }

            // ── Forgot password ────────────────────────────────────────────────
            async function handleForgotPassword() {
                const email = $('email').value.trim();
                if (!email) { show($('error-message'), 'Enter your email address first.'); return; }
                if (!window.firebaseAuth) return;
                try {
                    await window.firebaseAuth.resetPassword(email);
                    show($('success-message'), `Password reset email sent to ${email}. Check your inbox.`);
                } catch (err) {
                    show($('error-message'), window.firebaseAuth.errorMessage(err));
                }
            }

            // ── Resend verification ────────────────────────────────────────────
            async function handleResend() {
                if (!window.firebaseAuth) return;
                try {
                    await window.firebaseAuth.resendVerification();
                    show($('success-message'), 'Verification email sent! Please check your inbox.');
                    hide($('warning-message'));
                } catch (err) {
                    show($('error-message'), 'Failed to resend. Please try again.');
                }
            }

            // ── Wire up events ─────────────────────────────────────────────────
            function init() {
                $('login-form').addEventListener('submit', handleLogin);
                $('forgotPasswordLink').addEventListener('click', (e) => { e.preventDefault(); handleForgotPassword(); });
                $('resendBtn').addEventListener('click', handleResend);

                // Input focus animations
                document.querySelectorAll('.form-input').forEach(input => {
                    input.addEventListener('focus', () => input.parentElement.style.transform = 'scale(1.02)');
                    input.addEventListener('blur',  () => input.parentElement.style.transform = 'scale(1)');
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
