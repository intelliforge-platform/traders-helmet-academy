<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traders Helmet Academy</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #1e40af;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #64748b;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            border: none;
            padding: 0.875rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .links {
            text-align: center;
            margin-top: 1.5rem;
        }

        .links a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .divider {
            margin: 1rem 0;
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .admin-note {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Traders Helmet Academy</h1>
            <p>Access Your Trading Dashboard</p>
        </div>

        <div class="admin-note">
            <strong>Admin Login Ready!</strong><br>
            Use your admin credentials to access the management dashboard
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="admin@tradershelmetacademy.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" id="loginBtn" class="btn-primary">
                <span id="loginText">Sign In</span>
                <div id="loginSpinner" class="loading-spinner" style="display: none;"></div>
            </button>
        </form>

        <div class="links">
            <a href="/pages/auth/register.html">Don't have an account? Register</a>
            <div class="divider">or</div>
            <a href="/subscription.html">Subscribe to Academy</a>
        </div>
    </div>

    <!-- Firebase SDK v8 (with global firebase object) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCHdhs1wQxyslO7ecotTiqKyc9fH-cJI1k",
            authDomain: "traders-helmet-academy.firebaseapp.com",
            projectId: "traders-helmet-academy",
            storageBucket: "traders-helmet-academy.firebasestorage.app",
            messagingSenderId: "789631387729",
            appId: "1:789631387729:web:d1f176bcc091ec40c75070",
            measurementId: "G-QBB3Z50V5H"
        };

        // Initialize Firebase
        let app, auth;
        let isFirebaseReady = false;

        function initializeFirebase() {
            try {
                console.log('🔄 Initializing Firebase...');
                
                // Check if Firebase is loaded
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase SDK not loaded. Please check your internet connection.');
                }
                
                console.log('✅ Firebase SDK loaded successfully');
                
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                isFirebaseReady = true;
                console.log('✅ Firebase initialized successfully');
                
                // Show success message briefly
                showMessage('Firebase authentication ready!', 'success');
                setTimeout(() => hideMessage(), 2000);
                
            } catch (error) {
                console.error('❌ Firebase initialization failed:', error);
                showMessage(`Authentication service failed: ${error.message}`, 'error');
                isFirebaseReady = false;
                
                // Show alternative login option
                showAlternativeLogin();
            }
        }

        function showAlternativeLogin() {
            const adminNote = document.querySelector('.admin-note');
            adminNote.innerHTML = `
                <strong>⚠️ Authentication Service Issue</strong><br>
                Firebase SDK failed to load. <br>
                <button onclick="location.reload()" style="margin-top: 10px; padding: 5px 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Retry Connection
                </button>
            `;
        }

        // Utility functions
        function showMessage(message, type = 'error') {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            
            if (type === 'error') {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            } else {
                successEl.textContent = message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
            }
        }

        function hideMessage() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function setLoadingState(loading) {
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            if (loading) {
                loginBtn.disabled = true;
                loginText.textContent = 'Signing In...';
                loginSpinner.style.display = 'block';
            } else {
                loginBtn.disabled = false;
                loginText.textContent = 'Sign In';
                loginSpinner.style.display = 'none';
            }
        }

        // Main login function
        async function handleLogin(email, password) {
            if (!isFirebaseReady) {
                showMessage('Authentication service not ready. Please refresh the page.', 'error');
                return;
            }

            try {
                setLoadingState(true);
                console.log('🔄 Attempting to sign in user:', email);
                
                // Sign in with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('✅ Firebase sign-in successful:', user.uid);
                
                // Get ID token for API calls
                const idToken = await user.getIdToken();
                
                // Verify with backend API
                console.log('🔄 Verifying with backend...');
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        firebaseToken: idToken
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    console.log('✅ Backend verification successful');
                    showMessage('Login successful! Redirecting to dashboard...', 'success');
                    
                    // Store user info
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('authToken', idToken);
                    
                    // Redirect based on user type
                    setTimeout(() => {
                        if (result.redirectUrl) {
                            window.location.href = result.redirectUrl;
                        } else if (result.user.isAdmin) {
                            window.location.href = '/pages/admin/dashboard.html';
                        } else {
                            // Redirect based on subscription tier
                            switch (result.user.subscriptionTier) {
                                case 'gold':
                                    window.location.href = '/pages/dashboard/gold.html';
                                    break;
                                case 'platinum':
                                    window.location.href = '/pages/dashboard/platinum.html';
                                    break;
                                case 'diamond':
                                    window.location.href = '/pages/dashboard/diamond.html';
                                    break;
                                default:
                                    window.location.href = '/subscription.html';
                            }
                        }
                    }, 1500);
                    
                } else {
                    throw new Error(result.error || 'Backend verification failed');
                }
                
            } catch (error) {
                console.error('❌ Login failed:', error);
                
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No account found with this email address.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Please enter a valid email address.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many failed attempts. Please try again later.';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                showMessage(errorMessage, 'error');
                
            } finally {
                setLoadingState(false);
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Login page loaded');
            
            // Delay Firebase initialization to ensure scripts are loaded
            setTimeout(() => {
                initializeFirebase();
            }, 500);
            
            // Login form handler
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                hideMessage();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                if (!email || !password) {
                    showMessage('Please enter both email and password.', 'error');
                    return;
                }
                
                handleLogin(email, password);
            });
            
            // Pre-fill admin email for testing
            document.getElementById('email').value = 'admin@tradershelmetacademy.com';
        });

        // Check if user is already logged in
        window.addEventListener('load', function() {
            if (isFirebaseReady && auth.currentUser) {
                console.log('User already logged in, redirecting...');
                showMessage('Already logged in! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/pages/admin/dashboard.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
