<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Traders Helmet Academy</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1a2e 50%, #1a1a2e 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(220,38,38,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(239,68,68,0.05) 0%, transparent 50%);
        }
        .card {
            background: rgba(30,41,59,0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 3rem 2.5rem; width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; z-index: 1;
        }
        .brand { text-align: center; margin-bottom: 2.5rem; }
        .logo-box {
            width: 64px; height: 64px; background: linear-gradient(135deg, #dc2626, #ef4444);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem; margin: 0 auto 1rem;
            box-shadow: 0 8px 25px rgba(220,38,38,0.35);
        }
        .brand h1 { font-size: 1.5rem; font-weight: 800; color: #f1f5f9; margin-bottom: 0.25rem; }
        .brand p { color: #94a3b8; font-size: 0.88rem; }
        .admin-label {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.3);
            color: #ef4444; padding: 0.3rem 0.85rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; margin-bottom: 0.4rem; font-size: 0.88rem; font-weight: 600; color: #cbd5e1; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 0.9rem; }
        .form-input {
            width: 100%; padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #f1f5f9; font-size: 0.95rem; transition: all 0.3s; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: #ef4444; background: rgba(239,68,68,0.07); }
        .form-input::placeholder { color: #475569; }
        .toggle-pw { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748b; cursor: pointer; padding: 0.25rem; transition: color 0.2s; }
        .toggle-pw:hover { color: #cbd5e1; }
        .login-btn {
            width: 100%; padding: 1rem; background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220,38,38,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-top: 1rem; display: none; }
        .error-msg.show { display: block; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #64748b; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        .back-link:hover { color: #cbd5e1; }
        .security-note { display: flex; align-items: center; gap: 0.5rem; color: #475569; font-size: 0.78rem; justify-content: center; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="logo-box"><i class="fas fa-shield-alt"></i></div>
            <span class="admin-label"><i class="fas fa-lock"></i> Restricted Access</span>
            <h1>Admin Portal</h1>
            <p>Traders Helmet Academy</p>
        </div>

        <div class="form-group">
            <label class="form-label">Admin Email</label>
            <div class="input-wrap">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" class="form-input" placeholder="admin@tradershelmet.com">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <i class="fas fa-key input-icon"></i>
                <input type="password" id="password" class="form-input" placeholder="Enter your password">
                <button class="toggle-pw" type="button" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i>
            <span id="btnText">Sign In to Admin</span>
        </button>

        <div class="error-msg" id="errorMsg"></div>

        <a class="back-link" href="/pages/auth/login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>

        <div class="security-note"><i class="fas fa-shield-alt"></i> This portal is for authorized administrators only</div>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const app = initializeApp({
        apiKey: "AIzaSyCHdhs1wQxyslO7ecotTiqKyc9fH-cJI1k",
        authDomain: "traders-helmet-academy.firebaseapp.com",
        projectId: "traders-helmet-academy"
    });
    const auth = getAuth(app);
    const supabase = createClient(
        'https://evtghlwiiqvclnudiyor.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dGdobHdpaXF2Y2xudWRpeW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjYzNjgsImV4cCI6MjA4ODIwMjM2OH0.q93SKjmo_8R8AVyAZXtcNxUFH1ntjCkL7g4no6yfGpg'
    );

    window.togglePw = function() {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        icon.className = pw.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    };

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });
    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg; el.classList.add('show');
    }
    function hideError() { document.getElementById('errorMsg').classList.remove('show'); }

    window.handleLogin = async function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('Please enter your email and password.'); return; }

        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        btn.disabled = true;
        btnText.innerHTML = '<i class="fas fa-circle-notch spin"></i> Verifying...';
        hideError();

        try {
            // Step 1: Firebase login
            const { user } = await signInWithEmailAndPassword(auth, email, password);

            // Step 2: Check admin role in Supabase
            const { data: profile, error } = await supabase.from('user_profiles').select('role, first_name').eq('id', user.uid).single();
            if (error || !profile) throw new Error('Profile not found.');
            if (profile.role !== 'admin') {
                // Sign out non-admins immediately
                const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
                await signOut(auth);
                throw new Error('Access denied. This portal is for administrators only.');
            }

            // Step 3: Redirect to admin dashboard
            window.location.href = '/pages/admin/dashboard.html';

        } catch (err) {
            btn.disabled = false;
            btnText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In to Admin';
            const messages = {
                'auth/user-not-found': 'No admin account found with this email.',
                'auth/wrong-password': 'Incorrect password.',
                'auth/invalid-credential': 'Invalid email or password.',
                'auth/too-many-requests': 'Too many attempts. Please wait a few minutes.'
            };
            showError(messages[err.code] || err.message);
        }
    };
</script>
</body>
</html>
