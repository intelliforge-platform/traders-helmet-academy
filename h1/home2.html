<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #8B4513 0%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .maintenance-container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        
        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border: 3px solid #8B4513;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            padding: 5px;
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
        
        h1 {
            color: #8B4513;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        
        p {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .contact-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        
        .contact-info a {
            color: #8B4513;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }
        
        .contact-info a:hover {
            color: #5a2d0c;
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .maintenance-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .logo-container {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo-container">
            <!-- Replace this img tag with your actual logo -->
            <img src="../images/IMG-20250519-WA0072.jpg" alt="Company Logo" class="logo-img">
            <!-- If you don't have the logo yet, you can use this placeholder: -->
            <!-- <div style="color: #8B4513; font-size: 16px;">LOGO</div> -->
        </div>
        <h1>Website is Under Maintenance</h1>
        <p>We're currently working on improving our website to serve you better. Please check back soon!</p>
        
        <div class="contact-info">
            <p>For urgent inquiries, please contact us:</p>
            <p>
                <a href="mailto:contact@example.com">info@tradershelmetacademy.com</a> | 
                <a href="tel:+1234567890">+234 (705) 277-7715</a>
            </p>
        </div>
    </div>
</body>
</html>
