<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome - Traders Helmet Academy</title>
    <style>
        :root {
            --dark-blue: #0A1A2F;
            --cream: #FFF8E1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-blue) 60%, var(--cream) 40%);
            color: var(--cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: slideDown 1.5s ease;
        }

        .logo-wrapper {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--cream);
            overflow: hidden;
            margin: 10px auto;
            animation: popIn 1s ease;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .tagline {
            margin-top: 15px;
            font-style: italic;
            font-size: 1.2rem;
            animation: fadeInText 2s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInText {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .tagline {
                font-size: 1rem;
            }

            .logo-wrapper {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to Traders Helmet Academy</h1>
    <a href="https://tradershelmetacademy.com/home" class="logo-wrapper" title="Enter Site">
        <img src="../../../Documents/EGDownloads/maintenance_page_with_logo/logo.jpg" alt="Traders Helmet Academy Logo">
    </a>
    <div class="tagline">. . . learn and trade like a pro</div>
</body>
</html>
